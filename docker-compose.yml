version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: company_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: company_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d company_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sql_assistant_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/company_db
      - GIGACHAT_CREDENTIALS=${GIGACHAT_API_KEY}
      - GIGACHAT_API_KEY=${GIGACHAT_API_KEY}
      - GIGACHAT_AUTH_URL=${GIGACHAT_AUTH_URL:-https://ngw.devices.sberbank.ru:9443/api/v2/oauth}
      - PYTHONUNBUFFERED=1
      - FRONTEND_DIR=/app/frontend
    volumes:
      - .:/app:rw
      - ./logs:/app/logs:rw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    command: >
      sh -c "
        until nc -z -w 2 postgres 5432; do sleep 2; done;
        uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
      "

networks:
  app-network:
    driver: bridge
    name: sql-assistant-network

volumes:
  postgres_data:
    name: sql_assistant_postgres_data