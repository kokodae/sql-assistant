<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Assistant</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --muted: #666666;
            --border: #cccccc;
            --hover: #f5f5f5;
            --radius: 4px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --fg: #e0e0e0;
                --muted: #888888;
                --border: #333333;
                --hover: #1a1a1a;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        header h1 { font-weight: 500; font-size: 13px; }
        .status { color: var(--muted); font-size: 11px; }
        .status.online { color: var(--fg); }
        
        .layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-right: 1px solid var(--border);
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            line-height: 1.4;
            font-size: 13px;
            white-space: pre-wrap;
        }
        .message.user {
            align-self: flex-end;
            background: var(--fg);
            color: var(--bg);
            border-color: var(--fg);
        }
        .message.assistant { align-self: flex-start; }
        .message.error { border-color: var(--fg); }
        .message.system {
            color: var(--muted);
            font-size: 11px;
            border: none;
            padding: 4px 0;
            align-self: center;
        }
        
        #input-area {
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background: var(--bg);
        }
        #message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--fg);
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
        #message-input:focus { border-color: var(--fg); }
        #send-btn {
            padding: 10px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--fg);
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #send-btn:hover { background: var(--hover); }
        #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        #schema-panel {
            width: 260px;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg);
            font-size: 12px;
        }
        .schema-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .schema-table {
            margin-bottom: 14px;
            padding: 8px 0;
        }
        .schema-table-header {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .schema-col {
            color: var(--muted);
            padding: 2px 0 2px 16px;
            font-size: 11px;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .schema-col span:first-child { color: var(--fg); }
        
        code { background: var(--hover); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
        pre { background: var(--hover); padding: 10px; border-radius: var(--radius); overflow-x: auto; font-size: 12px; }
        table { border-collapse: collapse; width: 100%; margin: 6px 0; }
        th, td { text-align: left; padding: 4px 8px; border: 1px solid var(--border); font-size: 12px; }
        th { font-weight: 600; background: var(--hover); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        
        @media (max-width: 768px) {
            .layout { flex-direction: column; }
            #chat { border-right: none; border-bottom: 1px solid var(--border); }
            #schema-panel { width: 100%; border-top: 1px solid var(--border); max-height: 180px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>sql-assistant</h1>
        <span class="status" id="connection-status">offline</span>
    </header>
    
    <div class="layout">
        <div id="chat">
            <div class="message assistant">sql assistant ready.
available tables: companies, employees.
enter a query.</div>
        </div>
        
        <aside id="schema-panel">
            <div class="schema-title">schema</div>
            <div id="schema-content">
                <div class="schema-col">loading...</div>
            </div>
        </aside>
    </div>
    
    <form id="input-area">
        <input type="text" id="message-input" placeholder="> " autocomplete="off" autofocus>
        <button type="submit" id="send-btn">send</button>
    </form>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('message-input');
        const form = document.getElementById('input-area');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('connection-status');
        const schemaContent = document.getElementById('schema-content');
        
        let ws = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT = 5;
        
        function addMessage(content, role = 'assistant', isSystem = false) {
            const msg = document.createElement('div');
            msg.className = `message ${role}${isSystem ? ' system' : ''}`;
            msg.textContent = content;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }
        
        function updateStatus(text, online = false) {
            statusEl.textContent = text;
            statusEl.className = `status${online ? ' online' : ''}`;
        }
        
        async function loadSchema() {
            try {
                const res = await fetch('/api/schema');
                const data = await res.json();
                if (!data || Object.keys(data).length === 0) {
                    schemaContent.innerHTML = '<div class="schema-col">▪ schema empty</div>';
                    return;
                }
                
                let html = '';
                for (const [tableName, columns] of Object.entries(data)) {
                    html += `<div class="schema-table">`;
                    html += `<div class="schema-table-header">■ ${tableName}</div>`;
                    for (const col of columns) {
                        html += `<div class="schema-col">
                            ▪ <span>${col.column}</span> 
                            <span style="color:var(--muted)">${col.type}</span>
                        </div>`;
                    }
                    html += `</div>`;
                }
                schemaContent.innerHTML = html;
            } catch {
                schemaContent.innerHTML = '<div class="schema-col">▪ schema unavailable</div>';
            }
        }
        
        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws/chat`);
            
            ws.onopen = () => { updateStatus('online', true); reconnectAttempts = 0; loadSchema(); };
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'status') {
                        addMessage(data.content, 'system', true);
                    } else if (data.type === 'response') {
                        addMessage(data.content, 'assistant');
                        sendBtn.disabled = false; input.focus();
                    } else if (data.type === 'error') {
                        addMessage(data.content, 'error');
                        sendBtn.disabled = false;
                    }
                } catch { addMessage(event.data, 'assistant'); sendBtn.disabled = false; }
            };
            ws.onclose = () => {
                updateStatus('offline');
                if (reconnectAttempts < MAX_RECONNECT) { reconnectAttempts++; setTimeout(connect, 1000 * reconnectAttempts); }
            };
            ws.onerror = () => { ws.close(); };
        }
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const message = input.value.trim();
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) return;
            addMessage(message, 'user');
            ws.send(JSON.stringify({ message }));
            input.value = '';
            sendBtn.disabled = true;
        });
        
        connect();
        loadSchema();
        
        window.sql = { reconnect: connect, clear: () => chat.innerHTML = '' };
    </script>
</body>
</html>
